name: Generate iOS Project

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Confirm Node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios --save

      - name: Create Capacitor config if missing
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Titan Solutions" "com.deleomedia.titansolutions" --web-dir=dist
          fi

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Commit iOS project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ios package.json package-lock.json capacitor.config.*
          git commit -m "Add iOS Capacitor project" || echo "No changes to commit"
          git push
