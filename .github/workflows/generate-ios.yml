name: Generate iOS Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios --save

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Commit iOS project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ios package.json package-lock.json
          git commit -m "Add iOS Capacitor project" || echo "No changes to commit"
          git push
